name: Update README

on:
  push:
    branches:
      - main
    paths-ignore: # Don't run if only generated artifacts were updated
      - 'README.md'
      - 'profile/README.md'
      - 'profile/stats.svg'
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual triggering

jobs:
  markscribe:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate README
        env:
          GITHUB_TOKEN: ${{ secrets.README_TOKEN }}
        shell: bash
        run: |
          attempts=3

          for attempt in $(seq 1 "$attempts"); do
            if docker run --rm \
              -e GITHUB_TOKEN \
              -v "$PWD:/github/workspace" \
              -w /github/workspace \
              fribbledom/markscribe \
              -write profile/README.md templates/README.md.tpl; then
              exit 0
            fi

            if [[ "$attempt" -lt "$attempts" ]]; then
              echo "markscribe failed on attempt $attempt/$attempts; retrying..."
            fi
          done

          echo "markscribe failed after $attempts attempts"
          exit 1

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update generated README"
          branch: main
          commit_user_name: readme-scribe[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: readme-scribe[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          skip_dirty_check: false
          skip_fetch: false
